<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Assignment 4 - Lighting</title>
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        canvas { border: 1px solid black; display: block; margin-bottom: 10px; }
        .row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .row label { min-width: 110px; }
        .row span  { min-width: 28px; }
        #light-swatch { width: 20px; height: 20px; border: 1px solid #999; display: inline-block; background: white; vertical-align: middle; }
    </style>
</head>

<body onload="main()">
    <h1>Assignment 4 - Lighting</h1>

    <canvas id="webgl" width="640" height="480">
        Please use a browser that supports "canvas"
    </canvas>

    <div>
        <p>FPS: <span id="fps">0</span> &nbsp;|&nbsp;
           <strong>WASD</strong> Move &nbsp;|&nbsp;
           <strong>Q/E</strong> Turn &nbsp;|&nbsp;
           <strong>Mouse drag</strong> Look around</p>

        <!-- Toggle buttons -->
        <p>
            <button id="btn-lighting">Lighting: ON</button>
            <button id="btn-normal">Normals: OFF</button>
            <button id="btn-point">Point Light: ON</button>
            <button id="btn-spot">Spot Light: OFF</button>
            <button id="btn-rotate">Auto-Rotate: ON</button>
        </p>

        <!-- Point light position -->
        <p><strong>Point Light Position</strong></p>
        <div class="row">
            <label>X Offset</label>
            <input type="range" id="sl-lx" min="-8" max="8" value="0" step="0.1">
            <span id="lbl-lx">0.0</span>
        </div>
        <div class="row">
            <label>Y Height</label>
            <input type="range" id="sl-ly" min="0" max="10" value="3" step="0.1">
            <span id="lbl-ly">3.0</span>
        </div>
        <div class="row">
            <label>Z Offset</label>
            <input type="range" id="sl-lz" min="-8" max="8" value="0" step="0.1">
            <span id="lbl-lz">0.0</span>
        </div>

        <!-- Light color -->
        <p><strong>Light Color</strong> <span id="light-swatch"></span></p>
        <div class="row">
            <label>Red</label>
            <input type="range" id="sl-lr" min="0" max="255" value="255">
            <span id="lbl-lr">255</span>
        </div>
        <div class="row">
            <label>Green</label>
            <input type="range" id="sl-lg" min="0" max="255" value="255">
            <span id="lbl-lg">255</span>
        </div>
        <div class="row">
            <label>Blue</label>
            <input type="range" id="sl-lb" min="0" max="255" value="255">
            <span id="lbl-lb">255</span>
        </div>
    </div>

    <!-- Libraries -->
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/webgl-utils.js"></script>

    <!-- App -->
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="Model.js"></script>
    <script src="Camera.js"></script>
    <script src="asg4.js"></script>
</body>
</html>
